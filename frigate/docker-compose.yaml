x-traefik-labels: &traefik-template
  traefik.enable: true
  traefik.http.routers.frigate-http.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.frigate-http.entrypoints: web
  traefik.http.routers.frigate-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  traefik.http.routers.frigate-https.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.frigate-https.entrypoints: websecure
  traefik.http.routers.frigate-https.tls: true
  traefik.http.routers.frigate-https.tls.certresolver: cloudflare
  traefik.http.routers.frigate-https.service: ${APP_NAME}
  traefik.http.services.frigate.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}

services:
  frigate:
    container_name: ${APP_NAME}
    image: ghcr.io/blakeblackshear/frigate:${IMAGE_TAG:-latest}
    restart: unless-stopped
    shm_size: 512mb
    ports:
      - 1984:1984
      - 8554:8554
      - 8555:8555/tcp
      - 8555:8555/udp
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -s http://localhost:5000/ || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config
      - ./media:/media/frigate
    networks:
      - frontend
    labels:
      <<: [*traefik-template, *homepage-template]

networks:
  frontend:
    external: true