x-traefik-labels: &traefik-template
  traefik.enable: true
  # HTTP → HTTPS redirect
  traefik.http.routers.PLACEHOLDER-http.rule: Host(`PLACEHOLDER.pulosu.hexie.dev`)
  traefik.http.routers.PLACEHOLDER-http.entrypoints: web
  traefik.http.routers.PLACEHOLDER-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  # HTTPS router
  traefik.http.routers.PLACEHOLDER-https.rule: Host(`PLACEHOLDER.pulosu.hexie.dev`)
  traefik.http.routers.PLACEHOLDER-https.entrypoints: websecure
  traefik.http.routers.PLACEHOLDER-https.tls: true
  traefik.http.routers.PLACEHOLDER-https.tls.certresolver: cloudflare
  # Match router to a named service
  traefik.http.routers.PLACEHOLDER-https.service: PLACEHOLDER
  # Define internal port for the service
  traefik.http.services.PLACEHOLDER.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}
  #homepage.ping: https://${APP_NAME}.${BASE_DOMAIN}



services:
  PLACEHOLDER:
    container_name: ${APP_NAME}
    image: PLACEHOLDER/ac:latest
    restart: unless-stopped
    user: "0:0"
    environment:
      - PUID=1000 
      - PGID=1000
    volumes:
      - ./config:/config
    networks:
      - frontend
    labels:
      <<: [*traefik-template, *homepage-template]

networks:
  frontend:
    external: true