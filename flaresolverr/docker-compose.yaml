x-traefik-labels: &traefik-template
  traefik.enable: true
  traefik.http.routers.flaresolverr-http.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.flaresolverr-http.entrypoints: web
  traefik.http.routers.flaresolverr-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  traefik.http.routers.flaresolverr-https.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.flaresolverr-https.entrypoints: websecure
  traefik.http.routers.flaresolverr-https.tls: true
  traefik.http.routers.flaresolverr-https.tls.certresolver: cloudflare
  traefik.http.routers.flaresolverr-https.service: ${APP_NAME}
  traefik.http.services.flaresolverr.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}

services:
  flaresolverr:
    container_name: ${APP_NAME}
    image: ghcr.io/flaresolverr/flaresolverr:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./config:/config
    networks:
      - frontend
    labels:
      <<: [*traefik-template, *homepage-template]

networks:
  frontend:
    external: true