x-traefik-labels: &traefik-template
  traefik.enable: true
  # HTTP → HTTPS redirect
  traefik.http.routers.kiwix-http.rule: Host(`kiwix.pulosu.hexie.dev`)
  traefik.http.routers.kiwix-http.entrypoints: web
  traefik.http.routers.kiwix-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  # HTTPS router
  traefik.http.routers.kiwix-https.rule: Host(`kiwix.pulosu.hexie.dev`)
  traefik.http.routers.kiwix-https.entrypoints: websecure
  traefik.http.routers.kiwix-https.tls: true
  traefik.http.routers.kiwix-https.tls.certresolver: cloudflare
  # Match router to a named service
  traefik.http.routers.kiwix-https.service: kiwix
  # Define internal port for the service
  traefik.http.services.kiwix.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}
  #homepage.ping: https://${APP_NAME}.${BASE_DOMAIN}



services:
  kiwix:
    container_name: ${APP_NAME}
    image: ghcr.io/kiwix/kiwix-serve:latest
    restart: unless-stopped
    volumes:
      - /18tb/kiwix/zim:/data
    networks:
      - frontend
    labels:
      <<: [*traefik-template, *homepage-template]
    command:
      - "*.zim"
networks:
  frontend:
    external: true