x-traefik-labels: &traefik-template
  traefik.enable: true
  traefik.http.routers.convertx-http.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.convertx-http.entrypoints: web
  traefik.http.routers.convertx-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  traefik.http.routers.convertx-https.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.convertx-https.entrypoints: websecure
  traefik.http.routers.convertx-https.tls: true
  traefik.http.routers.convertx-https.tls.certresolver: cloudflare
  traefik.http.routers.convertx-https.service: ${APP_NAME}
  traefik.http.services.convertx.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}

x-kuma-labels: &kuma-template
  kuma.convertx.http.name: ${HOMEPAGE_NAME}
  kuma.convertx.http.url: https://${APP_NAME}.${BASE_DOMAIN}
  kuma.convertx.http.max_retries: 3
  kuma.convertx.http.interval: 60

services:
  convertx:
    container_name: ${APP_NAME}
    image: ghcr.io/c4illin/convertx:${IMAGE_TAG:-latest}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -s http://localhost:${APP_PORT}/ || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3
    environment:
      JWT_SECRET: ${JWT_SECRET:-$(openssl rand -hex 32)}
      ACCOUNT_REGISTRATION: false
      LANGUAGE: en
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data:/app/data
    networks:
      - frontend
    labels:
      <<: [*traefik-template, *homepage-template, *kuma-template]

networks:
  frontend:
    external: true