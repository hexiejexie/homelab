services:
  discord-bot:
    container_name: ${APP_NAME}
    image: hexiejexie/discord-ip-bot:latest
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - frontend
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - COMMAND=!showip
    #labels:
    #  <<: [*traefik-template, *homepage-template]

networks:
  frontend:
    external: true