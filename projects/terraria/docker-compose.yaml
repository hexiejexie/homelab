x-traefik-labels: &traefik-template
  traefik.enable: true
  # HTTP → HTTPS redirect
  traefik.http.routers.terraria-http.rule: Host(`terraria.pulosu.hexie.dev`)
  traefik.http.routers.terraria-http.entrypoints: web
  traefik.http.routers.terraria-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  # HTTPS router
  traefik.http.routers.terraria-https.rule: Host(`terraria.pulosu.hexie.dev`)
  traefik.http.routers.terraria-https.entrypoints: websecure
  traefik.http.routers.terraria-https.tls: true
  traefik.http.routers.terraria-https.tls.certresolver: cloudflare
  # Match router to a named service
  traefik.http.routers.terraria-https.service: terraria
  # Define internal port for the service
  traefik.http.services.terraria.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}
  #homepage.ping: https://${APP_NAME}.${BASE_DOMAIN}



services:
  terraria:
    container_name: ${APP_NAME}
    image: passivelemon/terraria-docker:tmodloader-latest
    restart: unless-stopped
    user: "0:0"
    environment:
      - PUID=1000 
      - PGID=1000
    volumes:
      - ./config:/opt/terraria/config
    networks:
      - frontend
    ports:
      - 7777:7777
   # labels:
   #   <<: [*traefik-template, *homepage-template]

networks:
  frontend:
    external: true