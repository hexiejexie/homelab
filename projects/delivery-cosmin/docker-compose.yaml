x-traefik-labels: &traefik-template
  traefik.enable: true
  traefik.http.routers.delivery-cosmin-http.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`) || Host(`delivery.hexie.dev`)
  traefik.http.routers.delivery-cosmin-http.entrypoints: web
  traefik.http.routers.delivery-cosmin-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  traefik.http.routers.delivery-cosmin-https.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`) || Host(`delivery.hexie.dev`)
  traefik.http.routers.delivery-cosmin-https.entrypoints: websecure
  traefik.http.routers.delivery-cosmin-https.tls: true
  traefik.http.routers.delivery-cosmin-https.tls.certresolver: cloudflare
  traefik.http.routers.delivery-cosmin-https.service: ${APP_NAME}
  traefik.http.services.delivery-cosmin.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}

services:
  delivery-cosmin:
    container_name: ${APP_NAME}
    image: hexiejexie/delivery-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - ./romania:/app/romania
      - ./doc_number.txt:/app/doc_number.txt
    networks:
      - frontend
    labels:
      <<: [*traefik-template, *homepage-template]

networks:
  frontend:
    external: true