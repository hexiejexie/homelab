x-traefik-labels: &traefik-template
  traefik.enable: true
  # HTTP → HTTPS redirect
  traefik.http.routers.glances-http.rule: Host(`glances.pulosu.hexie.dev`)
  traefik.http.routers.glances-http.entrypoints: web
  traefik.http.routers.glances-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  # HTTPS router
  traefik.http.routers.glances-https.rule: Host(`glances.pulosu.hexie.dev`)
  traefik.http.routers.glances-https.entrypoints: websecure
  traefik.http.routers.glances-https.tls: true
  traefik.http.routers.glances-https.tls.certresolver: cloudflare
  # Match router to a named service
  traefik.http.routers.glances-https.service: glances
  # Define internal port for the service
  traefik.http.services.glances.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}
  #homepage.ping: https://${APP_NAME}.${BASE_DOMAIN}
  #homepage.widget.type: glances
  #homepage.widget.url: https://glances.pulosu.hexie.dev
  #homepage.widget.version: 4
  #homepage.widget.diskUnits: bytes
  #homepage.widget.metric: network:eth0
  #homepage.widget.refreshInterval: 5000


services:
  glances:
    container_name: ${APP_NAME}
    image: nicolargo/glances:ubuntu-latest-full
    restart: unless-stopped
    user: "0:0"
    environment:
      - PUID=1000 
      - PGID=1000
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - frontend
    labels:
      <<: [*traefik-template, *homepage-template]

networks:
  frontend:
    external: true