x-traefik-labels: &traefik-template
  traefik.enable: true
  traefik.http.routers.prometheus-http.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.prometheus-http.entrypoints: web
  traefik.http.routers.prometheus-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  traefik.http.routers.prometheus-https.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.prometheus-https.entrypoints: websecure
  traefik.http.routers.prometheus-https.tls: true
  traefik.http.routers.prometheus-https.tls.certresolver: cloudflare
  traefik.http.routers.prometheus-https.service: ${APP_NAME}
  traefik.http.services.prometheus.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}

x-kuma-labels: &kuma-template
  kuma.prometheus.http.name: ${HOMEPAGE_NAME}
  kuma.prometheus.http.url: https://${APP_NAME}.${BASE_DOMAIN}
  kuma.prometheus.http.max_retries: 3
  kuma.prometheus.http.interval: 60

services:
  prometheus:
    container_name: ${APP_NAME}
    image: prom/prometheus:${IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "0:0"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data:/prometheus
    networks:
      - frontend
      - backend
    labels:
      <<: [*traefik-template, *homepage-template, *kuma-template]

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_TAG:-v0.51.0}
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - backend
  adguard-exporter:
    container_name: adguard-exporter
    image: ghcr.io/henrywhitaker3/adguard-exporter:${ADGUARD_EXPORTER_TAG:-latest}
    restart: unless-stopped
    environment:
      ADGUARD_SERVERS: http://adguard:80
      ADGUARD_USERNAMES: ${ADGUARD_USER}
      ADGUARD_PASSWORDS: ${ADGUARD_PASS}
      INTERVAL: 120
    networks:
      - backend
networks:
  frontend:
    external: true
  backend:
    external: true