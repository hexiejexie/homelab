x-traefik-labels: &traefik-template
  traefik.enable: true
  traefik.http.routers.authentik-http.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.authentik-http.entrypoints: web
  traefik.http.routers.authentik-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  traefik.http.routers.authentik-https.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.authentik-https.entrypoints: websecure
  traefik.http.routers.authentik-https.tls: true
  traefik.http.routers.authentik-https.tls.certresolver: cloudflare
  traefik.http.routers.authentik-https.service: authentik
  traefik.http.services.authentik.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}

x-authentik-env: &authentik-env
  AUTHENTIK_POSTGRESQL__HOST: postgresql
  AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
  AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
  AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
  AUTHENTIK_REDIS__HOST: redis-auth
  AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}

x-authentik-common: &authentik-common
  image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.8.4}
  restart: unless-stopped
  env_file: .env
  environment:
    <<: *authentik-env
  depends_on:
    postgresql:
      condition: service_healthy
    redis-auth:
      condition: service_healthy

services:
  postgresql:
    container_name: authentik-postgresql
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./database:/var/lib/postgresql/data
    networks:
      - backend

  redis-auth:
    container_name: authentik-redis
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 20s
    volumes:
      - ./redis:/data
    networks:
      - backend

  server:
    <<: *authentik-common
    container_name: ${APP_NAME}
    command: server
    labels:
      <<: [*traefik-template, *homepage-template]
    networks:
      - frontend
      - backend
    volumes:
      - ./media:/media
      - ./custom-templates:/templates

  worker:
    <<: *authentik-common
    container_name: authentik-worker
    command: worker
    user: root
    networks:
      - backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./media:/media
      - ./certs:/certs
      - ./custom-templates:/templates

networks:
  frontend:
    external: true
  backend:
    external: true