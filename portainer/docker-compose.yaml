x-traefik-labels: &traefik-template
  traefik.enable: true
  traefik.http.routers.portainer-http.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.portainer-http.entrypoints: web
  traefik.http.routers.portainer-http.middlewares: redirect-to-https
  traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
  traefik.http.routers.portainer-https.rule: Host(`${APP_NAME}.${BASE_DOMAIN}`)
  traefik.http.routers.portainer-https.entrypoints: websecure
  traefik.http.routers.portainer-https.tls: true
  traefik.http.routers.portainer-https.tls.certresolver: cloudflare
  traefik.http.routers.portainer-https.service: ${APP_NAME}
  traefik.http.services.portainer.loadbalancer.server.port: ${APP_PORT}

x-homepage-labels: &homepage-template
  homepage.group: ${HOMEPAGE_GROUP}
  homepage.name: ${HOMEPAGE_NAME}
  homepage.icon: ${HOMEPAGE_ICON}
  homepage.href: https://${APP_NAME}.${BASE_DOMAIN}
  homepage.description: ${HOMEPAGE_DESCRIPTION}

services:
  portainer:
    container_name: ${APP_NAME}
    image: portainer/portainer-ce:${IMAGE_TAG:-lts}
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    networks:
      - frontend
    labels:
      <<: [*traefik-template, *homepage-template]

networks:
  frontend:
    external: true